services:
  db:
    image: postgres:16-alpine
    container_name: gene-data-uploader-db
    environment:
      POSTGRES_DB: gene_data_uploader
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gene_data_uploader"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
